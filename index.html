<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bybit Screener — Адаптивный ТФ</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e14;--bg2:#111620;--border:#1e2736;--text:#c9d1e0;--muted:#4a5568;--accent:#3b82f6;--up:#0ecb81;--dn:#f6465d;--header:#8899aa}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;min-height:100vh}
header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.logo{font-size:15px;font-weight:600;color:#fff}.logo span{color:var(--accent)}
.bdg{font-size:10px;background:#1a2540;color:var(--accent);padding:3px 8px;border-radius:4px;border:1px solid #1e3a6e}
.bdg-g{background:rgba(14,203,129,0.1);color:#0ecb81;border-color:rgba(14,203,129,0.3)}
.controls{padding:12px 24px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border)}
input[type=text]{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:12px;font-family:'IBM Plex Mono',monospace;outline:none;width:140px}
input[type=text]:focus{border-color:var(--accent)}
input[type=text]::placeholder{color:var(--muted)}
.fbtn{background:var(--bg2);border:1px solid var(--border);color:var(--header);padding:6px 12px;border-radius:6px;font-size:11px;font-family:'IBM Plex Mono',monospace;cursor:pointer;white-space:nowrap}
.fbtn:hover{border-color:var(--accent);color:var(--text)}
.fbtn.active{background:#1a2540;border-color:var(--accent);color:#60a5fa}
.rbtn{margin-left:auto;background:var(--bg2);border:1px solid var(--border);color:var(--header);padding:6px 12px;border-radius:6px;font-size:11px;font-family:'IBM Plex Mono',monospace;cursor:pointer;display:flex;align-items:center;gap:5px}
.rbtn:hover{border-color:#4ade80;color:#4ade80}
.rbtn.spinning svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.autolabel{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
.autolabel input{accent-color:var(--accent);width:13px;height:13px;cursor:pointer}
.status{font-size:11px;color:var(--muted);padding:8px 24px}
.twrap{overflow-x:auto;padding:0 24px 24px}
table{width:100%;border-collapse:collapse;min-width:900px}
thead th{padding:8px 8px;font-size:10px;font-weight:500;color:var(--header);border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--text)}
thead th.sorted{color:var(--accent)}
thead th.r{text-align:right}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s}
tbody tr:hover{background:var(--bg2)}
td{padding:7px 8px;vertical-align:middle}td.r{text-align:right}
.sym{font-weight:600;color:#fff;font-size:13px}
.base{color:var(--muted);font-size:11px}
.vol{color:var(--header);font-size:11px}
.ph{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:4px;white-space:nowrap;font-weight:500}
.pb{background:rgba(14,203,129,0.15);color:#0ecb81}
.co{background:rgba(255,185,0,0.12);color:#c8900a}
.im{background:rgba(246,70,93,0.12);color:#f6465d}
.neu{color:var(--muted);font-size:11px}
.vup{font-size:11px;color:var(--up)}.vdn{font-size:11px;color:var(--dn)}.vneu{font-size:11px;color:var(--muted)}
.tf4{font-size:10px;padding:2px 6px;border-radius:3px;background:rgba(59,130,246,0.15);color:#60a5fa}
.tf8{font-size:10px;padding:2px 6px;border-radius:3px;background:rgba(167,139,250,0.15);color:#a78bfa}
.tf24{font-size:10px;padding:2px 6px;border-radius:3px;background:rgba(251,146,60,0.15);color:#fb923c}
.loading{text-align:center;padding:60px;color:var(--muted);font-size:13px}
.dot{display:inline-block;animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
</style>
</head>
<body>
<header>
  <div class="logo">BYBIT <span>SCREENER</span></div>
  <div class="bdg">АДАПТИВНЫЙ ТФ</div>
  <div class="bdg" id="bdgCount">TOP 40</div>
  <div class="bdg bdg-g" id="bdgBreak">— пробоев</div>
</header>
<div class="controls">
  <input type="text" id="search" placeholder="Поиск..." oninput="renderTable()">
  <button class="fbtn active" onclick="setFilter('all',this)">Все</button>
  <button class="fbtn" onclick="setFilter('break',this)">▲ Пробой</button>
  <button class="fbtn" onclick="setFilter('consol',this)">◐ Консолид.</button>
  <button class="fbtn" onclick="setFilter('impulse',this)">▼ Импульс</button>
  <label class="autolabel"><input type="checkbox" id="autoRefresh" onchange="toggleAuto()"> Авто 60с</label>
  <label class="autolabel"><input type="checkbox" id="tgToggle" checked onchange="tgAlerts=this.checked"> TG алерты</label>
  <button class="rbtn" id="rbtn" onclick="loadData()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>
      <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
    </svg>
    Обновить
  </button>
</div>
<div class="status" id="status">Загрузка...</div>
<div class="twrap">
  <div id="tableWrap"><div class="loading">Подключаемся к Bybit<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div></div>
</div>

<script>
let allData=[],sortCol='phase',sortDir='desc',filterMode='all',autoTimer=null;

// Telegram алерты
const TG_TOKEN='8662258426:AAH8MT4588Dh0u_okVf21uch_0q-z1zKNKY';
const TG_CHAT='913976106';
let tgAlerts=true; // включить/выключить
let alertedSymbols={}; // чтобы не спамить одну монету

async function sendTelegram(msg){
  if(!tgAlerts)return;
  try{
    await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:TG_CHAT,text:msg,parse_mode:'HTML'})
    });
  }catch(e){}
}

function checkAlerts(data){
  const now=Date.now();
  data.forEach(t=>{
    if(t.phase==='break'){
      const key=t.symbol;
      // Алертим один раз в 4 часа на монету
      if(!alertedSymbols[key]||now-alertedSymbols[key]>4*60*60*1000){
        alertedSymbols[key]=now;
        const dist=t.distBreak!==null?`
До пробоя: ${t.distBreak.toFixed(2)} ATR`:'';
        const vol=t.volRatio!==null?`
Объём: ${t.volRatio.toFixed(1)}x`:'';
        const wave=t.ratio1h!==null?`
Волна 1ч: ${t.ratio1h.toFixed(2)}`:'';
        const vel=t.vel1h!==null?`
Скор.1ч: ${t.vel1h>0?'↑':'↓'} ${Math.abs(t.vel1h).toFixed(2)}`:'';
        const msg=`🚀 <b>ПРОБОЙ: ${t.symbol}</b>
ТФ: ${t.tf||'—'} · Скор: ${t.score}${dist}${vol}${wave}${vel}

https://www.bybit.com/trade/usdt/${t.sym}`;
        sendTelegram(msg);
      }
    }
    // Алерт когда монета близко к пробою (< 0.3 ATR)
    if(t.phase==='consol'&&t.distBreak!==null&&t.distBreak<0.3&&t.distBreak>0){
      const key=t.symbol+'_near';
      if(!alertedSymbols[key]||now-alertedSymbols[key]>2*60*60*1000){
        alertedSymbols[key]=now;
        const msg=`⚡ <b>БЛИЗКО К ПРОБОЮ: ${t.symbol}</b>
ТФ: ${t.tf||'—'} · ${t.distBreak.toFixed(2)} ATR до границы
Скор: ${t.score}`;
        sendTelegram(msg);
      }
    }
  });
}

function setFilter(m,btn){
  filterMode=m;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}
function toggleAuto(){
  const cb=document.getElementById('autoRefresh');
  if(cb.checked)autoTimer=setInterval(loadData,60000);
  else{clearInterval(autoTimer);autoTimer=null;}
}
function setSort(col){
  if(sortCol===col)sortDir=sortDir==='desc'?'asc':'desc';
  else{sortCol=col;sortDir='desc';}
  renderTable();
}

function detectPhase(candles){
  if(!candles||candles.length<4)return{phase:'none',strength:null,consolLow:null,consolHigh:null,volRatio:null,score:0};
  const n=candles.length;
  const atr=candles.reduce((s,c)=>s+Math.abs(c.c-c.o),0)/n;
  if(atr===0)return{phase:'none',strength:null,consolLow:null,consolHigh:null,volRatio:null,score:0};
  let impIdx=-1,impBody=0;
  for(let i=0;i<n-1;i++){
    const body=Math.abs(candles[i].c-candles[i].o);
    if(candles[i].c<candles[i].o&&body>impBody){impBody=body;impIdx=i;}
  }
  if(impIdx<0||impIdx>=n-2)return{phase:'impulse',strength:null,consolLow:null,consolHigh:null,volRatio:null,score:Math.round(Math.min(impBody/atr/2,1)*30)};
  const impScore=Math.min(impBody/atr/2,1)*40;
  const after=candles.slice(impIdx+1);
  const consolCandles=[];
  for(let i=0;i<after.length-1;i++){
    const body=Math.abs(after[i].c-after[i].o);
    if(body<atr*0.65)consolCandles.push(after[i]);
    else break;
  }
  if(!consolCandles.length)return{phase:'impulse',strength:null,consolLow:null,consolHigh:null,volRatio:null,score:Math.round(impScore)};
  const consolLow=Math.min(...consolCandles.map(c=>c.l));
  const consolHigh=Math.max(...consolCandles.map(c=>c.h));
  const avgConsolBody=consolCandles.reduce((s,c)=>s+Math.abs(c.c-c.o),0)/consolCandles.length;
  const consolScore=Math.min(consolCandles.length/3,1)*20+Math.min((atr-avgConsolBody)/atr,1)*10;
  const avgConsolVol=consolCandles.reduce((s,c)=>s+(c.v||1),0)/consolCandles.length;
  const last=after[after.length-1];
  const lastBody=Math.abs(last.c-last.o);
  const isGreen=last.c>last.o;
  const volRatio=(last.v||1)/(avgConsolVol||1);
  if(isGreen&&last.c>consolHigh){
    const strength=lastBody/impBody;
    const breakScore=Math.min(strength,1)*20+Math.min(volRatio/2,1)*10;
    return{phase:'break',strength,consolLow,consolHigh,volRatio,score:Math.round(impScore+consolScore+breakScore)};
  }
  return{phase:'consol',strength:null,consolLow,consolHigh,volRatio,score:Math.round(impScore+consolScore)};
}

async function getBestPhase(symbol){
  const tfs=[{interval:'D',label:'24ч',limit:10},{interval:'480',label:'8ч',limit:10},{interval:'240',label:'4ч',limit:12}];
  let best={phase:'none',score:0,tf:null,candles:null,consolLow:null,consolHigh:null,volRatio:null,strength:null};
  const phOrder={break:3,consol:2,impulse:1,none:0};
  for(const tf of tfs){
    try{
      const r=await fetch(`https://api.bybit.com/v5/market/kline?category=linear&symbol=${symbol}&interval=${tf.interval}&limit=${tf.limit}`);
      const d=await r.json();
      if(d.retCode!==0||!d.result||!d.result.list)continue;
      const candles=d.result.list.reverse().map(c=>({o:parseFloat(c[1]),h:parseFloat(c[2]),l:parseFloat(c[3]),c:parseFloat(c[4]),v:parseFloat(c[5])}));
      const ph=detectPhase(candles);
      if((phOrder[ph.phase]||0)>(phOrder[best.phase]||0)||(ph.phase===best.phase&&ph.score>best.score)){
        best={...ph,tf:tf.label,candles};
      }
    }catch(e){}
  }
  return best;
}

function calcRatio1h(list){
  const c=list.map(x=>parseFloat(x[4])),n=c.length;
  let li=-1,lv=Infinity;
  for(let i=1;i<n-1;i++)if(c[i]<c[i-1]&&c[i]<c[i+1]&&c[i]<lv){lv=c[i];li=i;}
  if(li<2)return null;
  let hv=-Infinity;
  for(let i=1;i<li-1;i++)if(c[i]>c[i-1]&&c[i]>c[i+1]&&c[i]>hv)hv=c[i];
  if(hv<=lv)return null;
  const b=hv-lv,dr=hv-c[0];
  return(b>0&&dr>0)?b/dr:null;
}

function candleSvg(candles,consolLow,consolHigh,phase){
  if(!candles||!candles.length)return '';
  const allH=candles.map(c=>c.h),allL=candles.map(c=>c.l);
  const hi=Math.max(...allH),lo=Math.min(...allL),range=hi-lo||1;
  const W=185,H=56,cw=13,gap=3;
  const sy=v=>H-((v-lo)/range)*(H-10)-5;
  let svg=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;
  if(consolLow!==null&&consolHigh!==null){
    const y1=sy(consolHigh),y2=sy(consolLow);
    const fc=phase==='break'?'rgba(14,203,129,0.1)':'rgba(255,185,0,0.09)';
    const sc=phase==='break'?'rgba(14,203,129,0.55)':'rgba(255,185,0,0.4)';
    svg+=`<rect x="0" y="${y1.toFixed(1)}" width="${W}" height="${Math.max(y2-y1,2).toFixed(1)}" fill="${fc}"/>`;
    svg+=`<line x1="0" y1="${y1.toFixed(1)}" x2="${W}" y2="${y1.toFixed(1)}" stroke="${sc}" stroke-width="0.9" stroke-dasharray="4,3"/>`;
    svg+=`<line x1="0" y1="${y2.toFixed(1)}" x2="${W}" y2="${y2.toFixed(1)}" stroke="${sc}" stroke-width="0.9" stroke-dasharray="4,3"/>`;
  }
  const maxV=Math.max(...candles.map(c=>c.v||1));
  candles.forEach((c,i)=>{
    const x=i*(cw+gap)+2,cx=x+cw/2,isLast=i===candles.length-1;
    const col=c.c>=c.o?'#0ecb81':'#f6465d';
    const vh=Math.max((c.v||0)/maxV*9,1);
    svg+=`<rect x="${x}" y="${(H-vh).toFixed(1)}" width="${cw}" height="${vh.toFixed(1)}" fill="${c.c>=c.o?'rgba(14,203,129,0.2)':'rgba(246,70,93,0.2)'}" rx="1"/>`;
    const yH=sy(c.h),yL=sy(c.l),yO=sy(c.o),yC=sy(c.c);
    const top=Math.min(yO,yC),bot=Math.max(yO,yC),bh=Math.max(bot-top,1.5);
    const op=isLast?1:0.65;
    svg+=`<line x1="${cx.toFixed(1)}" y1="${yH.toFixed(1)}" x2="${cx.toFixed(1)}" y2="${top.toFixed(1)}" stroke="${col}" stroke-width="1" opacity="${op}"/>`;
    svg+=`<line x1="${cx.toFixed(1)}" y1="${(top+bh).toFixed(1)}" x2="${cx.toFixed(1)}" y2="${yL.toFixed(1)}" stroke="${col}" stroke-width="1" opacity="${op}"/>`;
    svg+=`<rect x="${x}" y="${top.toFixed(1)}" width="${cw}" height="${bh.toFixed(1)}" fill="${col}" rx="1.5" opacity="${op}"/>`;
    if(isLast)svg+=`<rect x="${x-1}" y="${(top-1).toFixed(1)}" width="${cw+2}" height="${(bh+2).toFixed(1)}" fill="none" stroke="${col}" stroke-width="0.8" rx="2" opacity="0.5"/>`;
  });
  svg+='</svg>';
  return svg;
}

function phaseCell(p){
  if(p==='break')return`<span class="ph pb">▲ пробой</span>`;
  if(p==='consol')return`<span class="ph co">◐ консолид.</span>`;
  if(p==='impulse')return`<span class="ph im">▼ импульс</span>`;
  return`<span class="neu">—</span>`;
}
function tfCell(tf){
  if(!tf)return`<span class="neu">—</span>`;
  if(tf==='4ч')return`<span class="tf4">4ч</span>`;
  if(tf==='8ч')return`<span class="tf8">8ч</span>`;
  return`<span class="tf24">24ч</span>`;
}
function volCell(r){
  if(!r)return`<span class="vneu">—</span>`;
  if(r>=1.4)return`<span class="vup">↑${r.toFixed(1)}x</span>`;
  if(r<=0.75)return`<span class="vdn">↓${r.toFixed(1)}x</span>`;
  return`<span class="vneu">${r.toFixed(1)}x</span>`;
}
function scoreCell(s){
  const col=s>60?'#0ecb81':s>35?'#c8900a':s>0?'var(--muted)':'var(--muted)';
  return`<span style="font-size:11px;font-weight:500;color:${col}">${s}</span>`;
}
function phaseOrder(p){return p==='break'?3:p==='consol'?2:p==='impulse'?1:0;}
function fmtVol(v){
  if(v>=1e9)return(v/1e9).toFixed(2)+'B';
  if(v>=1e6)return(v/1e6).toFixed(1)+'M';
  if(v>=1e3)return(v/1e3).toFixed(1)+'K';
  return v.toFixed(0);
}

async function loadData(){
  const btn=document.getElementById('rbtn');
  btn.classList.add('spinning');
  document.getElementById('status').textContent='Загрузка...';
  try{
    const r=await fetch('https://api.bybit.com/v5/market/tickers?category=linear');
    const d=await r.json();
    if(d.retCode!==0)throw new Error('API error');
    const top40=d.result.list
      .filter(t=>t.symbol.endsWith('USDT'))
      .map(t=>({sym:t.symbol.replace('USDT',''),symbol:t.symbol,vol:parseFloat(t.turnover24h)||0}))
      .sort((a,b)=>b.vol-a.vol).slice(0,40);

    document.getElementById('tableWrap').innerHTML='<div class="loading">Анализируем паттерны на 3 ТФ<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>';

    const results=[];
    const batchSize=5;
    for(let i=0;i<top40.length;i+=batchSize){
      document.getElementById('status').textContent=`Анализ ${i}/${top40.length}...`;
      const batch=top40.slice(i,i+batchSize);
      const br=await Promise.all(batch.map(async t=>{
        const [ph,r1]=await Promise.all([
          getBestPhase(t.symbol),
          fetch(`https://api.bybit.com/v5/market/kline?category=linear&symbol=${t.symbol}&interval=60&limit=122`).then(x=>x.json()).catch(()=>null)
        ]);
        const ratio1h=r1&&r1.retCode===0?calcRatio1h(r1.result.list):null;
        // Скорость приближения к границе консолидации на 1ч
        let vel1h=null;
        if(r1&&r1.retCode===0&&r1.result&&r1.result.list&&ph.consolHigh!==null){
          const lst=r1.result.list; // newest first
          if(lst.length>=4){
            const curP=parseFloat(lst[0][4]);
            const p3ago=parseFloat(lst[3][4]);
            const atr1h=lst.slice(0,20).reduce((s,x)=>s+(parseFloat(x[2])-parseFloat(x[3])),0)/Math.min(lst.length,20);
            if(atr1h>0) vel1h=(curP-p3ago)/atr1h;
          }
        }
        // расстояние до пробоя в ATR (последние 20 свечей текущего ТФ)
        let distBreak = null;
        if((ph.phase==='consol'||ph.phase==='break')&&ph.consolHigh!==null&&ph.candles&&ph.candles.length){
          const curPrice=ph.candles[ph.candles.length-1].c;
          const atrCandles=ph.candles.slice(-20);
          const atr20=atrCandles.reduce((s,cv)=>s+Math.abs(cv.h-cv.l),0)/atrCandles.length;
          distBreak=atr20>0?(ph.consolHigh-curPrice)/atr20:null;
        }
        return{...t,...ph,ratio1h,distBreak,vel1h};
      }));
      results.push(...br);
    }

    allData=results;
    checkAlerts(results);
    const now=new Date();
    const ts=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    document.getElementById('status').textContent=`Обновлено: ${ts} · адаптивный ТФ · Bybit API`;
    renderTable();
  }catch(e){
    document.getElementById('tableWrap').innerHTML=`<div class="loading" style="color:var(--dn)">Ошибка: ${e.message}</div>`;
  }
  btn.classList.remove('spinning');
}

function renderTable(){
  const search=document.getElementById('search').value.toUpperCase().trim();
  let data=allData.filter(t=>{
    if(search&&!t.symbol.includes(search))return false;
    if(filterMode!=='all'&&t.phase!==filterMode)return false;
    return true;
  });
  data.sort((a,b)=>{
    if(sortCol==='phase')return sortDir==='desc'?(phaseOrder(b.phase)-phaseOrder(a.phase)||b.score-a.score):(phaseOrder(a.phase)-phaseOrder(b.phase)||a.score-b.score);
    if(sortCol==='score')return sortDir==='desc'?b.score-a.score:a.score-b.score;
    if(sortCol==='vol')return sortDir==='desc'?b.vol-a.vol:a.vol-b.vol;
    if(sortCol==='ratio1h')return sortDir==='desc'?(b.ratio1h??-1)-(a.ratio1h??-1):(a.ratio1h??-1)-(b.ratio1h??-1);
    if(sortCol==='distBreak')return sortDir==='desc'?(b.distBreak??999)-(a.distBreak??999):(a.distBreak??999)-(b.distBreak??999);
    if(sortCol==='vel1h')return sortDir==='desc'?(b.vel1h??-999)-(a.vel1h??-999):(a.vel1h??-999)-(b.vel1h??-999);
    return 0;
  });
  const bc=allData.filter(x=>x.phase==='break').length;
  document.getElementById('bdgCount').textContent=`TOP 40 · ${data.length}`;
  document.getElementById('bdgBreak').textContent=`${bc} пробоев`;
  document.getElementById('bdgBreak').style.background=bc>0?'rgba(14,203,129,0.1)':'#1a2540';
  document.getElementById('bdgBreak').style.color=bc>0?'#0ecb81':undefined;

  const cols=[
    {key:'#',label:'#',s:false},{key:'sym',label:'МОНЕТА',s:false},
    {key:'vol',label:'ОБЪЁМ 24ч'},{key:'candles',label:'СВЕЧИ',s:false},
    {key:'tf',label:'ТФ',s:false},{key:'phase',label:'ФАЗА'},
    {key:'score',label:'СКОР'},{key:'volR',label:'ОБЪ.СВЕЧИ',s:false},
    {key:'distBreak',label:'ДО ПРОБОЯ ATR'},{key:'vel1h',label:'СКОР.1ч'},{key:'ratio1h',label:'ВОЛНА 1ч'},
  ];
  let html=`<table><thead><tr>`;
  cols.forEach(c=>{
    const sorted=sortCol===c.key?'sorted':'';
    const arrow=sortCol===c.key?(sortDir==='desc'?' ▼':' ▲'):'';
    const click=c.s!==false?`onclick="setSort('${c.key}')"` :'';
    const r=['vol','tf','phase','score','volR','distBreak','vel1h','ratio1h'].includes(c.key)?'r':'';
    html+=`<th class="${sorted} ${r}" ${click}>${c.label}${arrow}</th>`;
  });
  html+=`</tr></thead><tbody>`;
  if(!data.length){
    html+=`<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--muted)">Нет данных</td></tr>`;
  } else {
    data.forEach((t,i)=>{
      const r1=t.ratio1h!==null?`<span style="font-size:12px;color:var(--text)">${t.ratio1h.toFixed(2)}</span>`:`<span class="neu">—</span>`;
      html+=`<tr>
        <td style="color:var(--muted);font-size:10px">${i+1}</td>
        <td><span class="sym">${t.sym}</span><span class="base">/USDT</span></td>
        <td class="r"><span class="vol">$${fmtVol(t.vol)}</span></td>
        <td>${candleSvg(t.candles,t.consolLow,t.consolHigh,t.phase)}</td>
        <td class="r">${tfCell(t.tf)}</td>
        <td class="r">${phaseCell(t.phase)}</td>
        <td class="r">${scoreCell(t.score)}</td>
        <td class="r">${volCell(t.volRatio)}</td>
        <td class="r">${(()=>{if(t.distBreak===null||t.distBreak===undefined)return'<span style="color:var(--muted);font-size:11px">—</span>';if(t.distBreak<=0)return'<span style="color:#0ecb81;font-size:11px;font-weight:600">пробой</span>';if(t.distBreak<0.3)return`<span style="color:#0ecb81;font-size:11px;font-weight:500">${t.distBreak.toFixed(2)} ATR</span>`;if(t.distBreak<1.0)return`<span style="color:#c8900a;font-size:11px">${t.distBreak.toFixed(2)} ATR</span>`;return`<span style="color:var(--muted);font-size:11px">${t.distBreak.toFixed(2)} ATR</span>`;})()}</td>
        <td class="r">${(()=>{
          const v=t.vel1h;
          if(v===null||v===undefined)return'<span style="color:var(--muted);font-size:11px">—</span>';
          if(v>0.5)return`<span style="color:#0ecb81;font-size:11px;font-weight:500">↑ ${v.toFixed(2)}</span>`;
          if(v>0.1)return`<span style="color:#0ecb81;font-size:11px;opacity:0.7">↑ ${v.toFixed(2)}</span>`;
          if(v<-0.5)return`<span style="color:#f6465d;font-size:11px;font-weight:500">↓ ${Math.abs(v).toFixed(2)}</span>`;
          if(v<-0.1)return`<span style="color:#f6465d;font-size:11px;opacity:0.7">↓ ${Math.abs(v).toFixed(2)}</span>`;
          return`<span style="color:var(--muted);font-size:11px">→ ${v.toFixed(2)}</span>`;
        })()}</td>
        <td class="r">${r1}</td>
      </tr>`;
    });
  }
  html+=`</tbody></table>`;
  document.getElementById('tableWrap').innerHTML=html;
}

loadData();
</script>
</body>
</html>
